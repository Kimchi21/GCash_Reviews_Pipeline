id: gcash_ingestion
namespace: gcash.reviews

description: "Scrape GCash reviews from Google Play and upload to GCS raw bucket"

triggers:
  - id: schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 0 * * *"  # runs daily at midnight

tasks:
  - id: scrape_and_upload
    type: io.kestra.plugin.scripts.python.Script
    description: "Run google-play-scraper and upload to GCS"
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install google-play-scraper google-cloud-storage -q
    env:
      GCP_PROJECT_ID: "gcash-reviews-pipeline"
      GCP_RAW_BUCKET: "gcash-reviews-raw"
      GOOGLE_APPLICATION_CREDENTIALS: "/gcp-credentials.json"
    inputFiles:
      scraper.py: "{{ read('ingestion/scraper.py') }}"
      gcp-credentials.json: "{{ read('/gcp-credentials.json') }}"
    script: |
      python scraper.py

  - id: log_completion
    type: io.kestra.plugin.core.log.Log
    message: "Ingestion complete — reviews uploaded to GCS raw bucket"