id: gcash_incremental_ingestion
namespace: gcash.reviews
description: "Incremental scrape of GCash reviews — picks up from last watermark"

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"

tasks:
  - id: incremental_scrape
    type: io.kestra.plugin.scripts.python.Commands
    description: "Scrape new reviews since last watermark and upload to GCS"
    docker:
      image: python:3.12-slim
    beforeCommands:
      - pip install google-play-scraper google-cloud-storage python-dotenv -q
      - mkdir -p /app/keys
      - |
        cat > /app/keys/gcp-credentials.json << 'EOF'
        {{ kv("gcp_credentials") }}
        EOF
    env:
      GCP_PROJECT_ID: "{{ kv('gcp_project_id') }}"
      GCP_RAW_BUCKET: "{{ kv('gcp_raw_bucket') }}"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/keys/gcp-credentials.json"
    inputFiles:
      incremental_scraper.py: "{{ read('ingestion/incremental_scraper.py') }}"
    commands:
      - python incremental_scraper.py

  - id: log_completion
    type: io.kestra.plugin.core.log.Log
    message: "Incremental ingestion complete — watermark updated in GCS"